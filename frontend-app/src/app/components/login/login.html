<div class="background"></div>

<div class="container" [@fadeIn]>

  <!-- Título principal (estilo simple y centrado, como en la imagen) -->
  <h1 class="app-title">Plant Disease Detector</h1>

  <mat-card class="login-card">

    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <!-- Campo de Correo -->
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Correo electrónico*</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-icon matSuffix>alternate_email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            El correo es requerido
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            Formato inválido
          </mat-error>
        </mat-form-field>

        <!-- Campo de Contraseña -->
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Contraseña*</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" />
          <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
            <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Contraseña requerida
          </mat-error>
        </mat-form-field>

        <!-- Botón de Entrar -->
        <button mat-flat-button color="primary" type="submit"
                [disabled]="form.invalid || isLoading"
                class="login-button">
          <ng-container *ngIf="!isLoading; else loading">Entrar</ng-container>
          <ng-template #loading>
            <mat-progress-spinner diameter="20" strokeWidth="3" mode="indeterminate"></mat-progress-spinner>
            Cargando...
          </ng-template>
        </button>

        <!-- Links: Olvidaste contraseña / Registrarse -->
        <div class="links">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
          <span>•</span>
          <a routerLink="/register">Registrarse</a>
        </div>

      </form>
    </mat-card-content>

  </mat-card>

</div>
